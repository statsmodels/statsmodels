name: Test Emscripten/Pyodide build using CIBW

on:
  pull_request:
    branches:
      - main
      - maintenance/**

env:
  FORCE_COLOR: 3

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true


jobs:
  build-wasm-emscripten:
    permissions:
      contents: read  # to fetch code (actions/checkout)
    name: Pyodide test
    runs-on: ubuntu-latest
    # To enable this workflow on a fork, comment out:
    if: github.repository == 'statsmodels/statsmodels'
    steps:
      - name: Checkout statsmodels
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6
        with:
          submodules: recursive
          fetch-tags: true
          persist-credentials: false

      - uses: pypa/cibuildwheel@a0a973acdc9e7b7f8b04ac5c80e6883a5a102615 #v4.1.0
        env:
          CIBW_PLATFORM: pyodide
          CIBW_BUILD: "cp313-*"
          CIBW_TEST_COMMAND: python -c "import statsmodels; statsmodels.test(['-sra', '--skip-examples', '--skip-slow'], exit=True)"
          CIBW_TEST_REQUIRES: pytest pytest-cov pytest-run-parallel matplotlib
